specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Nasdaq
providerId: nasdaq-omx-group
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Financial Data
  - Capital Markets
  - Market Data
description: 'FOCUS-aligned FinOps for Nasdaq Data Link APIs: free for community / open datasets and metered
  by a la carte premium dataset subscriptions. Cost is dataset-driven rather than call-volume-driven —
  the meaningful FinOps levers are which datasets are subscribed and which API keys are entitled.'
sources:
  - https://data.nasdaq.com/sign-up
  - https://docs.data.nasdaq.com/docs/in-depth-usage
  - https://docs.data.nasdaq.com/docs/rate-limits-1
  - https://help.data.nasdaq.com/article/464-what-is-included-with-my-premium-data-subscription
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Nasdaq, Inc.
serviceCategory: Market Data / Financial Data
billingModel:
  pricingCategory: Per-Dataset Subscription
  billingFrequency: Monthly / Annual (per dataset)
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
    - Tax
focusColumns:
  ServiceName: Nasdaq Data Link
  ServiceCategory: Market Data
  ProviderName: Nasdaq
  PublisherName: Nasdaq, Inc.
  InvoiceIssuerName: Nasdaq, Inc.
  BillingCurrency: USD
meters:
  - name: dataset_subscription
    unit: dataset-month
    aggregation: max
    dimensions:
      - dataset
      - account
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - api
      - dataset
  - name: bulk_exports
    unit: export
    aggregation: count
    dimensions:
      - api_key
      - dataset
  - name: bulk_downloads
    unit: download
    aggregation: count
    dimensions:
      - api_key
      - table
principles:
  - name: Visibility
    description: Track Data Link subscription invoices per dataset; use the API key as the allocation
      handle (one key per consuming application or research workstream) and read the rate-limit headers
      to monitor headroom.
  - name: Allocation
    description: Map datasets to research / trading / data-science cost centers; tag each Data Link API
      key with its owning team so subscription cost rolls up cleanly.
  - name: Optimization
    description: Cancel premium datasets that are not actively queried; consolidate research workloads
      onto a smaller number of premium keys; cache historical time-series locally rather than re-pulling
      static slices.
  - name: Accountability
    description: The data-platform / quant-research lead owns the dataset portfolio decision; engineering
      owns the consumption pattern (rate-limit-friendly, cached); procurement owns the renewal cadence.
maintainers:
