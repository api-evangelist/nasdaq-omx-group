specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Nasdaq
providerId: nasdaq-omx-group
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Financial Data
  - Capital Markets
  - Market Data
  - Time Series
description: Nasdaq Data Link is the public REST API surface most relevant to API consumers (the wider
  Nasdaq corporate group also sells exchange technology, listings, and surveillance products that are
  priced separately). Data Link is free for unauthenticated and signed-up users against open / community
  datasets, and a la carte premium subscriptions are added per-dataset. Premium subscription prices vary
  by dataset and are listed on each dataset's page rather than as a single tier table; subscription terms
  can be customized.
sources:
  - https://data.nasdaq.com/sign-up
  - https://docs.data.nasdaq.com/docs/in-depth-usage
  - https://docs.data.nasdaq.com/docs/rate-limits-1
  - https://help.data.nasdaq.com/article/464-what-is-included-with-my-premium-data-subscription
  - https://help.data.nasdaq.com/article/570-can-i-customize-existing-pricing-plans
plans:
  - id: nasdaq-data-link-anonymous
    name: Anonymous (No API Key)
    type: freemium
    description: Unauthenticated access to free Data Link datasets with very tight throttling.
    entries:
      - label: Anonymous calls per 10 minutes
        name: anon_10min
        type: quota
        metric: request
        limit: 20
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Anonymous calls per day
        name: anon_day
        type: quota
        metric: request
        limit: 50
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Free Time-series datasets
      - name: Free Tables datasets
  - id: nasdaq-data-link-free-key
    name: Free (API Key)
    type: freemium
    description: Free signed-up account with an API key. Higher rate limits than anonymous, no premium
      data access.
    entries:
      - label: Calls per 10 seconds
        name: free_10s
        type: quota
        metric: request
        limit: 300
        timeFrame: second
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Calls per 10 minutes
        name: free_10min
        type: quota
        metric: request
        limit: 2000
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Calls per day
        name: free_day
        type: quota
        metric: request
        limit: 50000
        timeFrame: day
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Time-series API
      - name: Tables API
      - name: Free dataset access only
  - id: nasdaq-data-link-premium
    name: Premium Data Subscription (a la carte)
    type: subscription
    description: Per-dataset premium subscriptions. Subscribers may subscribe to one or more premium
      datasets; subscription terms can be customized via the Data Link team.
    entries:
      - label: Premium dataset subscription (per dataset)
        name: premium_subscription
        type: subscription
        metric: dataset
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: see dataset page on data.nasdaq.com
        userMultiplied: false
      - label: Calls per 10 minutes
        name: premium_10min
        type: quota
        metric: request
        limit: 5000
        timeFrame: minute
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Calls per day
        name: premium_day
        type: quota
        metric: request
        limit: 720000
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Bulk export quota
        name: premium_bulk_export
        type: quota
        metric: export
        limit: 60
        timeFrame: hour
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Premium dataset access
      - name: Highest API rate limits
      - name: Premium support
      - name: Bulk export (qopts.export=true)
  - id: nasdaq-data-link-bulk-download
    name: Bulk Download API
    type: usage-based
    description: Bulk Download API quotas for premium tables datasets.
    entries:
      - label: Existing subscriber bulk requests per table per day
        name: bulk_existing
        type: quota
        metric: request
        limit: 30
        timeFrame: day
        geo: global
        unit: 1
        price: included with premium subscription
        userMultiplied: false
      - label: New subscriber initial bulk requests
        name: bulk_new
        type: quota
        metric: request
        limit: 25
        timeFrame: day
        geo: global
        unit: 1
        price: included with premium subscription
        userMultiplied: false
    elements:
      - name: Bulk Download endpoints
      - name: Tables API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
