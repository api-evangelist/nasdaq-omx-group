name: Nasdaq
description: >-
  Nasdaq is a global technology company serving capital markets and other industries, providing trading, clearing,
  exchange technology, listing, information, and public company services. Nasdaq Data Link offers REST APIs for
  accessing financial, economic, and alternative data.
