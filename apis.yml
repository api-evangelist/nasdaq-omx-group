      - type: OpenAPI
        url: openapi/nasdaq-omx-group-openapi.yml
  - aid: nasdaq-omx-group:data-link-tables
    name: Nasdaq Data Link Tables API
    description: >-
      REST API for retrieving Tables-style datasets, supporting filtering by
      column, query parameters, and large result sets via pagination or
      bulk download.
    humanURL: https://docs.data.nasdaq.com/docs/tables-1
    baseURL: https://data.nasdaq.com/api/v3
    tags:
      - Tables
      - Financial Data
      - Datasets
    properties:
      - type: Documentation
        url: https://docs.data.nasdaq.com/docs/tables-1
      - type: SignUp
        url: https://data.nasdaq.com/sign-up
  - aid: nasdaq-omx-group:data-link-streaming
    name: Nasdaq Data Link Streaming API
    description: >-
      Streaming API providing real-time delivery of market data through
